{% extends "base.html" %}

{% block content %}

<h2>Fatigue Analysis Form</h2>

<form method="POST" action="/predict">

<label>Sleep Hours</label>
<input type="number" step="0.1" name="sleep">

<label>Sleep Quality (1-10)</label>
<input type="number" name="sleep_quality">

<label>Screen Time (hours)</label>
<input type="number" step="0.1" name="screen">

<label>Stress Level (1-10)</label>
<input type="number" name="stress">

<label>Physical Activity (hours)</label>
<input type="number" step="0.1" name="activity">

<label>Water Intake (liters)</label>
<input type="number" step="0.1" name="water">

<label>Work Hours</label>
<input type="number" step="0.1" name="work">

<label>Caffeine Intake</label>
<input type="number" name="caffeine">

<label>Mood Level (1-10)</label>
<input type="number" name="mood">

<button type="submit">Analyze Fatigue</button>

</form>

{% endblock %}
