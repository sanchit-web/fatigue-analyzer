{% extends "base.html" %}

{% block content %}

<h2>Fatigue Dashboard</h2>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="chart"></canvas>

<script>

var ctx = document.getElementById("chart");

new Chart(ctx,{
type:"line",
data:{
labels: {{ dates | safe }},
datasets:[{
label:"Fatigue Score",
data: {{ scores | safe }},
borderWidth:2
}]
},
options:{
responsive:true
}
});

</script>

{% endblock %}
