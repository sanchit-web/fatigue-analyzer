{% extends "base.html" %}
{% block content %}

<h1>Fatigue History</h1>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="chart"></canvas>

<script>
let scores = {{ scores|tojson }};

new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: scores.map((_, i) => i + 1),
        datasets: [{
            label: "Fatigue Score",
            data: scores
        }]
    }
});
</script>

{% endblock %}
